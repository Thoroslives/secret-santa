name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Least privilege by default; the docker job opts into packages: write.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"

jobs:
  # Deterministic core: lint, typecheck, unit tests, production build.
  test:
    runs-on: ubuntu-latest
    env:
      # Prisma reads a sqlite provider url from DATABASE_URL. Neither
      # `prisma generate` nor `next build`/`jest` connect to it (the unit
      # suite mocks Prisma), so any valid sqlite path works here.
      DATABASE_URL: "file:./ci.db"
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests (jest)
        run: npm test

      - name: Production build
        run: npm run build

  # End-to-end smoke of the key flows. Playwright's config auto-starts
  # `next dev` as its web server, so this job needs a migrated sqlite DB
  # and a session secret for the app to boot. Kept separate from `test`
  # so a browser flake never blocks the image build.
  e2e:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:./e2e.db"
      NEXTAUTH_URL: "http://localhost:3000"
      # Throwaway, obviously-fake values so the app boots under test.
      # NOT real credentials. Real secrets are injected at deploy time.
      SESSION_SECRET: "ci-e2e-session-secret-not-a-real-value-0123456789"
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Migrate the e2e database
        run: npx prisma migrate deploy

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests (playwright)
        run: npm run test:e2e

  # Build the single container and publish to GHCR. Only on pushes to main
  # (:latest + :sha) and version tags (:X.Y.Z + :latest). Never on PRs.
  docker:
    needs: [test]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          # Lowercased automatically -> ghcr.io/thoroslives/secret-santa
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
